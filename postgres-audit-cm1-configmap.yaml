apiVersion: v1
data:
  postgres_audit.sql: "-- E-Vote Audit Database Schema (WORM - Write-Once-Read-Many)\n-- Host: localhost:5434\n-- Database: audit_db\n-- User: audit_service_user (INSERT only), audit_reader (SELECT only)\n\n-- CRITICAL: This database uses WORM (Write-Once-Read-Many) principles\n-- Logs can NEVER be modified or deleted, only appended\n\n-- Create audit_service_user if it doesn't exist\nDO $$\nBEGIN\n    IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = 'audit_service_user') THEN\n        CREATE ROLE audit_service_user WITH LOGIN PASSWORD 'audit_user_password_change_me_xyz';\n    END IF;\nEND\n$$;\n\n-- Grant INSERT-only permissions to audit_service_user\nGRANT CONNECT ON DATABASE audit_db TO audit_service_user;\nGRANT USAGE ON SCHEMA public TO audit_service_user;\n\n-- Main audit logs table (append-only)\nCREATE TABLE audit_logs (\n    id BIGSERIAL PRIMARY KEY,  -- Serial for strict ordering (not UUID)\n    timestamp TIMESTAMP DEFAULT NOW() NOT NULL,\n    service_name VARCHAR(100) NOT NULL,  -- 'auth', 'voting', 'audit'\n    action VARCHAR(255) NOT NULL,  -- 'user.registered', 'vote.cast', 'poll.closed'\n    resource_type VARCHAR(100),  -- 'user', 'vote', 'poll'\n    resource_id UUID,  -- The entity being acted upon\n    actor_email VARCHAR(255),  -- Email of who performed action (anonymous for votes)\n    status VARCHAR(50),  -- 'SUCCESS', 'FAILURE', 'BLOCKED'\n    details TEXT NOT NULL,  -- Extra context stored as TEXT for signature consistency\n    log_signature VARCHAR(256),  -- HMAC-SHA256 signature for tamper detection\n    created_at TIMESTAMP DEFAULT NOW() NOT NULL\n);\n\n-- Event types for filtering and analysis\nCREATE TABLE audit_log_events (\n    id UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n    log_id BIGINT NOT NULL REFERENCES audit_logs(id),\n    event_type VARCHAR(100) NOT NULL,  -- Used for filtering ('authentication', 'voting', 'admin')\n    severity VARCHAR(20) DEFAULT 'INFO',  -- 'INFO', 'WARN', 'ERROR', 'CRITICAL'\n    created_at TIMESTAMP DEFAULT NOW()\n);\n\n-- Indexes for fast lookups\nCREATE INDEX idx_audit_timestamp ON audit_logs(timestamp DESC);\nCREATE INDEX idx_audit_service ON audit_logs(service_name);\nCREATE INDEX idx_audit_action ON audit_logs(action);\nCREATE INDEX idx_audit_resource ON audit_logs(resource_type, resource_id);\nCREATE INDEX idx_audit_actor ON audit_logs(actor_email);\nCREATE INDEX idx_audit_status ON audit_logs(status);\nCREATE INDEX idx_events_type ON audit_log_events(event_type);\n\n-- Function to prevent any updates or deletes (WORM enforcement)\nCREATE OR REPLACE FUNCTION prevent_audit_modification()\nRETURNS TRIGGER AS $$\nBEGIN\n    RAISE EXCEPTION 'Audit logs are immutable. Modifications not allowed.';\nEND;\n$$ LANGUAGE plpgsql;\n\n-- Triggers to enforce immutability\nCREATE TRIGGER prevent_audit_logs_update\nBEFORE UPDATE OR DELETE ON audit_logs\nFOR EACH ROW EXECUTE FUNCTION prevent_audit_modification();\n\n-- View for easy audit analysis\nCREATE VIEW audit_summary AS\nSELECT \n    DATE_TRUNC('day', timestamp) as date,\n    service_name,\n    action,\n    status,\n    COUNT(*) as event_count\nFROM audit_logs \nGROUP BY DATE_TRUNC('day', timestamp), service_name, action, status\nORDER BY date DESC, event_count DESC;\n\n-- Grant INSERT-only permissions to audit_service_user (after tables created)\nGRANT INSERT ON audit_logs TO audit_service_user;\nGRANT INSERT ON audit_log_events TO audit_service_user;\nGRANT USAGE ON SEQUENCE audit_logs_id_seq TO audit_service_user;\nGRANT SELECT ON audit_logs TO audit_service_user;  -- Need SELECT to generate signatures\n\n-- Explicitly REVOKE UPDATE and DELETE\nREVOKE UPDATE, DELETE ON audit_logs FROM audit_service_user;\nREVOKE UPDATE, DELETE ON audit_log_events FROM audit_service_user;\n\n-- Grant permissions on all tables to audit_service_user (AFTER table creation)\nGRANT INSERT ON ALL TABLES IN SCHEMA public TO audit_service_user;\nGRANT SELECT ON ALL TABLES IN SCHEMA public TO audit_service_user;\nGRANT USAGE ON ALL SEQUENCES IN SCHEMA public TO audit_service_user;\nGRANT USAGE ON SCHEMA public TO audit_service_user;\n\n-- Revoke modifications\nREVOKE UPDATE, DELETE ON ALL TABLES IN SCHEMA public FROM audit_service_user;\n"
kind: ConfigMap
metadata:
  annotations:
    use-subpath: "true"
  labels:
    io.kompose.service: postgres-audit
  name: postgres-audit-cm1
