apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yml -o /home/hojaldre/repos/E-Vote-GitOps/
    kompose.version: 1.38.0 (HEAD)
  labels:
    io.kompose.service: voting-service
  name: voting-service
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: voting-service
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f docker-compose.yml -o /home/hojaldre/repos/E-Vote-GitOps/
        kompose.version: 1.38.0 (HEAD)
      labels:
        io.kompose.service: voting-service
    spec:
      initContainers:
        - name: wait-for-db
          image: busybox
          command:
            - sh
            - -c
            - until (echo > /dev/tcp/postgres-voting/5432) 2>/dev/null; do echo "waiting for postgres-voting..."; sleep 2; done
          timeoutSeconds: 60
      containers:
        - args:
            - uvicorn
            - main:app
            - --host
            - 0.0.0.0
            - --port
            - "3002"
          envFrom:
            - configMapRef:
                name: evote-env
            - secretRef:
                name: evote-secrets
          env:
            - name: DB_HOST
              value: "postgres-voting"
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: "voting_user"
            - name: DB_NAME
              value: "voting_db"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: evote-secrets
                  key: VOTING_DB_PASSWORD
          image: ghcr.io/ricardoandaluzsinisterra/evote-voting-service:main-dcbf07a
          livenessProbe:
            exec:
              command:
                - curl
                - -f
                - http://localhost:3002/health
            failureThreshold: 3
            periodSeconds: 30
            timeoutSeconds: 5
          name: voting-service
          ports:
            - containerPort: 3002
              protocol: TCP
      imagePullSecrets:
        - name: ghcr-secret
      restartPolicy: Always
