apiVersion: v1
data:
  postgres_auth.sql: |-
    -- E-Vote Auth Database Schema
    -- Host: localhost:5432
    -- Database: auth_db
    -- User: auth_user

    -- Create auth_user if it doesn't exist
    DO $$
    BEGIN
        IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = 'auth_user') THEN
            CREATE ROLE auth_user WITH LOGIN PASSWORD 'auth_user_password_change_me_456';
        END IF;
    END
    $$;

    -- Grant necessary permissions
    GRANT ALL PRIVILEGES ON DATABASE auth_db TO auth_user;
    GRANT ALL PRIVILEGES ON SCHEMA public TO auth_user;
    GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO auth_user;
    GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO auth_user;

    -- Users table for authentication only
    CREATE TABLE users (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        email VARCHAR(255) UNIQUE NOT NULL,
        password_hash VARCHAR(255) NOT NULL,
        phone_number VARCHAR(20),
        is_verified BOOLEAN DEFAULT FALSE,
        is_admin BOOLEAN DEFAULT FALSE,
        totp_secret VARCHAR(255),
        totp_enabled BOOLEAN DEFAULT FALSE,
        created_at TIMESTAMP DEFAULT NOW(),
        updated_at TIMESTAMP DEFAULT NOW()
    );

    -- OTP tokens for email verification and 2FA
    CREATE TABLE otp_tokens (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        user_id UUID REFERENCES users(id) ON DELETE CASCADE,
        token_hash VARCHAR(255) NOT NULL,
        user_type VARCHAR(20) NOT NULL DEFAULT 'voter', -- 'voter' or 'admin'
        expires_at TIMESTAMP NOT NULL,
        used_at TIMESTAMP,
        created_at TIMESTAMP DEFAULT NOW()
    );

    -- JWT tokens for session management
    CREATE TABLE jwt_tokens (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        user_id UUID NOT NULL REFERENCES users(id) ON DELETE CASCADE,
        token_jti VARCHAR(255) UNIQUE NOT NULL,
        expires_at TIMESTAMP NOT NULL,
        revoked_at TIMESTAMP,
        created_at TIMESTAMP DEFAULT NOW()
    );

    -- User sessions
    CREATE TABLE sessions (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        user_id UUID NOT NULL REFERENCES users(id) ON DELETE CASCADE,
        token_jti VARCHAR(255) REFERENCES jwt_tokens(token_jti),
        ip_address VARCHAR(45),
        user_agent TEXT,
        created_at TIMESTAMP DEFAULT NOW(),
        expires_at TIMESTAMP NOT NULL
    );

    -- Voter registration records (for pre-approved voters)
    CREATE TABLE voter_records (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        email VARCHAR(255) UNIQUE NOT NULL,
        full_name VARCHAR(255) NOT NULL,
        phone_number VARCHAR(50) NOT NULL,
        voter_id VARCHAR(100) UNIQUE NOT NULL,
        registration_token VARCHAR(500) UNIQUE NOT NULL,
        token_used BOOLEAN DEFAULT FALSE,
        created_at TIMESTAMP DEFAULT NOW()
    );

    -- Indexes for performance
    CREATE INDEX idx_users_email ON users(email);
    CREATE INDEX idx_otp_user ON otp_tokens(user_id);
    CREATE INDEX idx_otp_type ON otp_tokens(user_type);
    CREATE INDEX idx_jwt_user ON jwt_tokens(user_id);
    CREATE INDEX idx_jwt_jti ON jwt_tokens(token_jti);
    CREATE INDEX idx_sessions_user ON sessions(user_id);
    CREATE INDEX idx_voter_records_email ON voter_records(email);
    CREATE INDEX idx_voter_records_token ON voter_records(registration_token);

    -- Row-level security disabled for demo
    -- (In production, implement RLS policies for additional safety)
    -- ALTER TABLE users ENABLE ROW LEVEL SECURITY;
    -- ALTER TABLE otp_tokens ENABLE ROW LEVEL SECURITY;
    -- ALTER TABLE jwt_tokens ENABLE ROW LEVEL SECURITY;

    -- Function to update updated_at timestamp
    CREATE OR REPLACE FUNCTION update_updated_at_column()
    RETURNS TRIGGER AS $$
    BEGIN
        NEW.updated_at = NOW();
        RETURN NEW;
    END;
    $$ language 'plpgsql';

    -- Trigger to automatically update updated_at
    CREATE TRIGGER update_users_updated_at BEFORE UPDATE ON users
    FOR EACH ROW EXECUTE FUNCTION update_updated_at_column();

    -- Grant permissions on all tables to auth_user (AFTER table creation)
    GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO auth_user;
    GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO auth_user;
    GRANT USAGE ON SCHEMA public TO auth_user;
kind: ConfigMap
metadata:
  annotations:
    use-subpath: "true"
  labels:
    io.kompose.service: postgres-auth
  name: postgres-auth-cm1
