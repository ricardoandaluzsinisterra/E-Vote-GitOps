apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: evote-ingress
  namespace: evote
  annotations:
    konghq.com/strip-path: "true"
    kubernetes.io/ingress.class: kong
spec:
  rules:
  - http:
      paths:
      - path: /api/auth
        pathType: Prefix
        backend:
          service:
            name: auth-service
            port:
              number: 3001
      - path: /api/vote
        pathType: Prefix
        backend:
          service:
            name: voting-service
            port:
              number: 3002
      - path: /api/audit
        pathType: Prefix
        backend:
          service:
            name: audit-service
            port:
              number: 3003
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 5173
