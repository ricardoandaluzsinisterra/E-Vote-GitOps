apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yml -o /home/hojaldre/repos/E-Vote-GitOps/
    kompose.version: 1.38.0 (HEAD)
  labels:
    io.kompose.service: auth-service
  name: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: auth-service
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f docker-compose.yml -o /home/hojaldre/repos/E-Vote-GitOps/
        kompose.version: 1.38.0 (HEAD)
      labels:
        io.kompose.service: auth-service
    spec:
      initContainers:
        - name: wait-for-db
          image: busybox
          command:
            - sh
            - -c
            - |
              i=0; until (echo > /dev/tcp/postgres-auth/5432) 2>/dev/null; do
                i=$((i+1)); [ $i -ge 30 ] && echo "Timed out waiting for postgres-auth" && exit 1;
                echo "waiting for postgres-auth..."; sleep 2;
              done
      containers:
        - args:
            - uvicorn
            - auth_service.main:app
            - --host
            - 0.0.0.0
            - --port
            - "3001"
          envFrom:
            - configMapRef:
                name: evote-env
            - secretRef:
                name: evote-secrets
          env:
            - name: DB_HOST
              value: "postgres-auth"
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: "auth_user"
            - name: DB_NAME
              value: "auth_db"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: evote-secrets
                  key: AUTH_DB_PASSWORD
          image: ghcr.io/ricardoandaluzsinisterra/evote-auth-service:main-dcbf07a
          livenessProbe:
            exec:
              command:
                - curl
                - -f
                - http://localhost:3001/health
            failureThreshold: 3
            periodSeconds: 30
            timeoutSeconds: 5
          name: auth-service
          ports:
            - containerPort: 3001
              protocol: TCP
      imagePullSecrets:
        - name: ghcr-secret
      restartPolicy: Always
