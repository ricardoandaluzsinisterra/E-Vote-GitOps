apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yml -o /home/hojaldre/repos/E-Vote-GitOps/
    kompose.version: 1.38.0 (HEAD)
  labels:
    io.kompose.service: auth-service
  name: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: auth-service
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f docker-compose.yml -o /home/hojaldre/repos/E-Vote-GitOps/
        kompose.version: 1.38.0 (HEAD)
      labels:
        io.kompose.service: auth-service
    spec:
      initContainers:
        - name: wait-for-db
          image: busybox
          command:
            - sh
            - -c
            - |
              echo "[wait-for-db] Starting. Target: postgres-auth:5432"
              i=0
              while true; do
                result=$(nc -w 1 postgres-auth 5432 </dev/null 2>&1; echo "exit:$?")
                echo "[wait-for-db] attempt $i: $result"
                if echo "$result" | grep -q "exit:0"; then
                  echo "[wait-for-db] Connected!"
                  exit 0
                fi
                i=$((i+1))
                if [ $i -ge 30 ]; then
                  echo "[wait-for-db] Timed out after $((i*2))s"
                  exit 1
                fi
                sleep 2
              done
      containers:
        - args:
            - uvicorn
            - auth_service.main:app
            - --host
            - 0.0.0.0
            - --port
            - "3001"
          envFrom:
            - configMapRef:
                name: evote-env
            - secretRef:
                name: evote-secrets
          env:
            - name: DB_HOST
              value: "postgres-auth"
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: "auth_user"
            - name: DB_NAME
              value: "auth_db"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: evote-secrets
                  key: AUTH_DB_PASSWORD
          image: ghcr.io/ricardoandaluzsinisterra/evote-auth-service:main-23ab5ff
          livenessProbe:
            exec:
              command:
                - curl
                - -f
                - http://localhost:3001/health
            failureThreshold: 3
            periodSeconds: 30
            timeoutSeconds: 5
          name: auth-service
          ports:
            - containerPort: 3001
              protocol: TCP
      imagePullSecrets:
        - name: ghcr-secret
      restartPolicy: Always
