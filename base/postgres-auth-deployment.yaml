apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yml -o /home/hojaldre/repos/E-Vote-GitOps/
    kompose.version: 1.38.0 (HEAD)
  labels:
    io.kompose.service: postgres-auth
  name: postgres-auth
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: postgres-auth
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f docker-compose.yml -o /home/hojaldre/repos/E-Vote-GitOps/
        kompose.version: 1.38.0 (HEAD)
      labels:
        io.kompose.service: postgres-auth
    spec:
      containers:
        - envFrom:
            - configMapRef:
                name: evote-env
            - secretRef:
                name: evote-secrets
          image: postgres:17-alpine
          livenessProbe:
            exec:
              command:
                - pg_isready -U postgres -d auth_db
            failureThreshold: 5
            periodSeconds: 10
            timeoutSeconds: 3
          name: postgres-auth
          ports:
            - containerPort: 5432
              protocol: TCP
          volumeMounts:
            - mountPath: /var/lib/postgresql/data
              name: postgres-auth-data
            - mountPath: /docker-entrypoint-initdb.d/01-schema.sql
              name: postgres-auth-cm1
              readOnly: true
              subPath: 01-schema.sql
      restartPolicy: Always
      volumes:
        - name: postgres-auth-data
          persistentVolumeClaim:
            claimName: postgres-auth-data
        - configMap:
            items:
              - key: postgres_auth.sql
                path: 01-schema.sql
            name: postgres-auth-cm1
          name: postgres-auth-cm1
