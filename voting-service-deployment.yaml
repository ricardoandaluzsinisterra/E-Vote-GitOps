apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yml -o /home/hojaldre/repos/E-Vote-GitOps/
    kompose.version: 1.38.0 (HEAD)
  labels:
    io.kompose.service: voting-service
  name: voting-service
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: voting-service
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f docker-compose.yml -o /home/hojaldre/repos/E-Vote-GitOps/
        kompose.version: 1.38.0 (HEAD)
      labels:
        io.kompose.service: voting-service
    spec:
      containers:
        - args:
            - uvicorn
            - main:app
            - --host
            - 0.0.0.0
            - --port
            - "3002"
          env:
            - name: DB_HOST
              value: postgres-voting
            - name: DB_NAME
              value: voting_db
            - name: DB_PASSWORD
              value: voting_user_password_change_me_abc
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: voting_user
            - name: JWT_ALGORITHM
              value: HS256
            - name: JWT_SECRET_KEY
              value: change-me-to-a-long-random-secret-key
            - name: KAFKA_BOOTSTRAP
              value: kafka:9092
            - name: KAFKA_TOPIC_VOTES
              value: vote.cast
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: SERVICE_PORT
              value: "3002"
            - name: SERVICE_ROLE
              value: voting
            - name: VOTE_SIGNING_KEY
              value: change-me-to-another-long-random-secret
          image: voting-service
          livenessProbe:
            exec:
              command:
                - curl
                - -f
                - http://localhost:3002/health
            failureThreshold: 3
            periodSeconds: 30
            timeoutSeconds: 5
          name: voting-service
          ports:
            - containerPort: 3002
              protocol: TCP
          volumeMounts:
            - mountPath: /app
              name: voting-service-cm0
      restartPolicy: Always
      volumes:
        - configMap:
            name: voting-service-cm0
          name: voting-service-cm0
