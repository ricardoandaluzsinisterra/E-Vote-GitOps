apiVersion: v1
data:
  postgres_voting.sql: "-- E-Vote Voting Database Schema\n-- Host: localhost:5433\n-- Database: voting_db\n-- User: voting_user\n\n-- Create voting_user if it doesn't exist\nDO $$\nBEGIN\n    IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = 'voting_user') THEN\n        CREATE ROLE voting_user WITH LOGIN PASSWORD 'voting_user_password_change_me_abc';\n    END IF;\nEND\n$$;\n\n-- Grant necessary permissions\nGRANT ALL PRIVILEGES ON DATABASE voting_db TO voting_user;\nGRANT ALL PRIVILEGES ON SCHEMA public TO voting_user;\nGRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO voting_user;\nGRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO voting_user;\n\n-- Polls table with time-lock enforcement\nCREATE TABLE polls (\n    id UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n    title VARCHAR(500) NOT NULL,\n    description TEXT,\n    poll_start_time TIMESTAMP NOT NULL,\n    poll_end_time TIMESTAMP NOT NULL,\n    created_by_email VARCHAR(255) NOT NULL,  -- Store email only, no user_id reference\n    status VARCHAR(50) DEFAULT 'PENDING',  -- PENDING, ACTIVE, CLOSED, FINALIZED\n    created_at TIMESTAMP DEFAULT NOW(),\n    updated_at TIMESTAMP DEFAULT NOW(),\n    \n    -- CONSTRAINT: Cannot modify timestamps after creation (TIME-LOCK)\n    CONSTRAINT poll_immutable_times CHECK (poll_end_time > poll_start_time)\n);\n\n-- Poll options\nCREATE TABLE poll_options (\n    id UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n    poll_id UUID NOT NULL REFERENCES polls(id) ON DELETE CASCADE,\n    option_text VARCHAR(500) NOT NULL,\n    option_order INT NOT NULL,\n    created_at TIMESTAMP DEFAULT NOW()\n);\n\n-- Votes table with anonymity and integrity protection\nCREATE TABLE votes (\n    id UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n    poll_id UUID NOT NULL REFERENCES polls(id) ON DELETE RESTRICT,\n    anonymous_voter_token VARCHAR(255) NOT NULL,  -- Hashed token, NOT user email\n    poll_option_id UUID NOT NULL REFERENCES poll_options(id) ON DELETE RESTRICT,\n    vote_hash VARCHAR(64) NOT NULL,  -- SHA256 hash for integrity verification\n    vote_timestamp TIMESTAMP NOT NULL,\n    created_at TIMESTAMP DEFAULT NOW(),\n    \n    -- CONSTRAINT: One vote per anonymous token per poll (prevents double voting)\n    CONSTRAINT unique_voter_poll UNIQUE(poll_id, anonymous_voter_token)\n    \n    -- Note: Time window validation is enforced in application code\n    -- CHECK constraints cannot use subqueries in PostgreSQL\n);\n\n-- Vote tally for results (calculated after poll closes)\nCREATE TABLE vote_tally (\n    id UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n    poll_id UUID NOT NULL REFERENCES polls(id) ON DELETE RESTRICT,\n    poll_option_id UUID NOT NULL REFERENCES poll_options(id) ON DELETE RESTRICT,\n    vote_count INT DEFAULT 0,\n    finalized_at TIMESTAMP,\n    created_at TIMESTAMP DEFAULT NOW(),\n    updated_at TIMESTAMP DEFAULT NOW(),\n    \n    CONSTRAINT unique_tally UNIQUE(poll_id, poll_option_id)\n);\n\n-- Indexes for performance and integrity\nCREATE INDEX idx_votes_poll ON votes(poll_id);\nCREATE INDEX idx_votes_token ON votes(anonymous_voter_token);\nCREATE INDEX idx_votes_hash ON votes(vote_hash);  -- For integrity verification\nCREATE INDEX idx_polls_status ON polls(status);\nCREATE INDEX idx_polls_times ON polls(poll_start_time, poll_end_time);\nCREATE INDEX idx_tally_poll ON vote_tally(poll_id);\nCREATE INDEX idx_options_poll ON poll_options(poll_id, option_order);\n\n-- Function to prevent modification of closed/finalized polls\nCREATE OR REPLACE FUNCTION raise_immutable_error()\nRETURNS TRIGGER AS $$\nBEGIN\n    RAISE EXCEPTION 'Cannot modify closed or finalized polls';\nEND;\n$$ LANGUAGE plpgsql;\n\n-- Prevent modification of closed polls (TIME-LOCK enforcement)\nCREATE TRIGGER prevent_closed_poll_modification\nBEFORE UPDATE ON polls\nFOR EACH ROW\nWHEN (OLD.status IN ('CLOSED', 'FINALIZED'))\nEXECUTE FUNCTION raise_immutable_error();\n\n-- Auto-update updated_at timestamp\nCREATE OR REPLACE FUNCTION update_updated_at_column()\nRETURNS TRIGGER AS $$\nBEGIN\n    NEW.updated_at = NOW();\n    RETURN NEW;\nEND;\n$$ LANGUAGE plpgsql;\n\nCREATE TRIGGER update_polls_updated_at BEFORE UPDATE ON polls\nFOR EACH ROW EXECUTE FUNCTION update_updated_at_column();\n\nCREATE TRIGGER update_tally_updated_at BEFORE UPDATE ON vote_tally\nFOR EACH ROW EXECUTE FUNCTION update_updated_at_column();\n\n-- Row-level security disabled for demo\n-- (In production, implement RLS policies for additional safety)\n-- ALTER TABLE polls ENABLE ROW LEVEL SECURITY;\n-- ALTER TABLE votes ENABLE ROW LEVEL SECURITY;\n\n-- Grant permissions on all tables to voting_user (AFTER table creation)\nGRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO voting_user;\nGRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO voting_user;\nGRANT USAGE ON SCHEMA public TO voting_user;\n"
kind: ConfigMap
metadata:
  annotations:
    use-subpath: "true"
  labels:
    io.kompose.service: postgres-voting
  name: postgres-voting-cm1
